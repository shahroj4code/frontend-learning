<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MS App</title>
    <link rel="stylesheet" href="appStyle.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  </head>
  <body>
    <div class="container">
      <div>
        <h2>Currency Converter</h2>
      </div>
      <form>
        <div class="input-amout">
          <p>Enter Amount</p>
          <input type="text" value="100" />
        </div>
        <div class="dropdown">
          <div class="from">
            <p>From</p>
            <div class="select-container">
              <!-- <img src="https://flagsapi.com/US/flat/64.png" alt="" /> -->
              <img src="logo.jpg" alt="" />
              <select name="from">
                <option value="IN">INR</option>
                <option value="IN">USD</option>
                <option value="IN">EUR</option>
              </select>
            </div>
          </div>
          <i class="fa-solid fa-arrow-right-arrow-left"></i>
          <div class="To">
            <div class="from">
              <p>To</p>
              <div class="select-container">
                <!-- <img src="https://flagsapi.com/IN/flat/64.png" alt="" /> -->
                <img src="logo.jpg" alt="" />
                <select name="from">
                  <option value="IN">INR</option>
                  <option value="IN">USD</option>
                  <option value="IN">EUR</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div class="msg">1USD = 90INR</div>
        <button>Get Exchange Rate</button>
      </form>
    </div>
    <script src="app.js"></script>
    <script src="countrycode.js"></script>
  </body>
</html>
