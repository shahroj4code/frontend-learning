<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram</title>
    <link rel="stylesheet" href="insta.css" />
  </head>
  <body>
    <div id="container">
      <header class="header">
        <div id="select-lang">
          <p>English(india)</p>
        </div>

        <div id="logo">
          <img
            src="/level3/logo.jpg"
            alt="image"
            id="insta-logo"
            class="logo-btn"
            height="100px"
            width="100px" />
        </div>
      </header>
      <form action="" class="form-input">
        <input
          class="input-from"
          id="verification"
          type="text"
          placeholder="Mobile number or email" />
        <br />

        <input
          class="input-form"
          id="password"
          type="text"
          placeholder="Password" />
        <br />

        <button class="login-submit" id="log-in">Log in</button> <br />
        <a class="forgot" href="#">Forgot password?</a>
      </form>
    </div>
    <footer class="footer-content">
      <a href="#" id="new-account">Create new account </a> <br />
      <h2>Meta</h2>
    </footer>
  </body>
</html>
